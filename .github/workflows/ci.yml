name: Full CI/CD with GitOps (Production Style)

on:
  push:
    branches:
      - main

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      # Checkout the app repo
      - name: Checkout app repo
        uses: actions/checkout@v3

      # Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
      
      # Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/$IMAGE_NAME:${{ github.sha }} app/

      # Push Docker image
      - name: Push Docker image
        run: |
          docker push ghcr.io/$IMAGE_NAME:${{ github.sha }}

      # Checkout GitOps repo
      - name: Checkout GitOps repo
        uses: actions/checkout@v3
        with:
          repository: roshaan1103/aiops-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      # Update deployment.yaml with new image tag
      - name: Update deployment.yaml
        run: |
          sed -i "s|image: .*|image: ghcr.io/$IMAGE_NAME:${{ github.sha }}|g" gitops/apps/aiops-app/deployment.yaml

      # Commit and push changes to GitOps repo
      - name: Commit and push GitOps update
        run: |
          cd gitops
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add apps/aiops-app/deployment.yaml
          git diff --cached --quiet || git commit -m "Update image to ${{ github.sha }}""
          git push
