name: CI/CD with GitOps

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the app repo
      - name: Checkout app repo
        uses: actions/checkout@v3

      # Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/roshaan1103/k8sagro-helm-app:${GITHUB_SHA} app/

      # Push Docker image
      - name: Push Docker image
        run: |
          docker push ghcr.io/roshaan1103/k8sagro-helm-app:${GITHUB_SHA}

      # Checkout GitOps repo
      - name: Checkout GitOps repo
        uses: actions/checkout@v3
        with:
          repository: roshaan1103/aiops-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      # Update deployment.yaml with new image tag
      - name: Update deployment.yaml
        run: |
          sed -i "s|image: ghcr.io/roshaan1103/k8sagro-helm-app:.*|image: ghcr.io/roshaan1103/k8sagro-helm-app:${GITHUB_SHA}|g" gitops/deployment.yaml

      # Commit and push changes to GitOps repo
      - name: Commit and push GitOps update
        run: |
          cd gitops
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add deployment.yaml
          git commit -m "Update image to $GITHUB_SHA"
          git push
